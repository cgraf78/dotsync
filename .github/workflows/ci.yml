name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install shellcheck
        run: sudo apt-get install -y shellcheck
      - name: Lint dotsync
        run: shellcheck bin/dotsync
      - name: Lint tests
        run: shellcheck tests/dotsync-test tests/test-helpers.sh

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: sudo apt-get install -y rsync diffutils
      - name: Run tests
        run: bash tests/dotsync-test
