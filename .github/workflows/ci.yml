name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install shellcheck
        run: sudo apt-get install -y shellcheck
      - name: Lint dotsync
        run: shellcheck -x bin/dotsync
      - name: Lint tests
        run: shellcheck -x -P tests tests/dotsync-test tests/test-helpers.sh

  test:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get install -y rsync diffutils
      - name: Install bash (macOS)
        if: runner.os == 'macOS'
        run: brew install bash
      - name: Run tests
        run: bash tests/dotsync-test
